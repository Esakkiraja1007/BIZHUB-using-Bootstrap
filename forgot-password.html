<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | BIZHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-surface">
    <header class="section-panel position-sticky top-0" style="z-index: 1030;">
        <nav class="container navbar navbar-expand-lg navbar-light py-2">
            <a href="index.html#home" class="navbar-brand d-flex align-items-center gap-2">
                <img src="image/logo.png" alt="Logo" class="logo rounded-circle" width="40" height="40">
                <span>BIZ<span class="logo-title">HUB</span></span>
            </a>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="section-panel">
                    <h1 class="h3 fw-bold mb-2 text-center">Forgot Password</h1>
                    <p class="text-muted text-center">Enter your email to reset your password.</p>
                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" placeholder="you@email.com" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-lg" type="submit">Send Reset Link</button>
                            <a class="btn btn-outline-secondary" href="login.html">Back to Login</a>
                        </div>
                        <p class="text-muted small mt-3 mb-0">
                            UI-only demo: button does not send an email.
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
