<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | BIZHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-surface">
    <header class="section-panel position-sticky top-0" style="z-index: 1030;">
        <nav class="container navbar navbar-expand-lg navbar-light py-2">
            <a href="ecommerce.html" class="navbar-brand d-flex align-items-center gap-2">
                <img src="image/logo.png" alt="Logo" class="logo rounded-circle" width="40" height="40">
                <span>BIZ<span class="logo-title">HUB</span> Checkout</span>
            </a>
            <div class="ms-auto d-flex gap-2">
                <a class="btn btn-outline-secondary" href="cart.html">Back to Cart</a>
            </div>
        </nav>
    </header>

    <main class="container my-4">
        <div class="row g-4">
            <div class="col-12 col-lg-8">
                <div class="section-panel">
                    <h1 class="h3 fw-bold mb-3">Checkout</h1>
                    <form>
                        <h5 class="fw-bold mb-2">Shipping</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-12 col-md-6">
                                <label class="form-label" for="firstName">First name</label>
                                <input class="form-control" id="firstName" type="text" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label" for="lastName">Last name</label>
                                <input class="form-control" id="lastName" type="text" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="address">Address</label>
                                <input class="form-control" id="address" type="text" placeholder="123 Main St" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label" for="city">City</label>
                                <input class="form-control" id="city" type="text" required>
                            </div>
                            <div class="col-12 col-md-3">
                                <label class="form-label" for="state">State</label>
                                <input class="form-control" id="state" type="text" required>
                            </div>
                            <div class="col-12 col-md-3">
                                <label class="form-label" for="zip">ZIP</label>
                                <input class="form-control" id="zip" type="text" required>
                            </div>
                        </div>

                        <h5 class="fw-bold mb-2">Payment</h5>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label" for="cardName">Name on card</label>
                                <input class="form-control" id="cardName" type="text" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="cardNumber">Card number</label>
                                <input class="form-control" id="cardNumber" type="text" placeholder="0000 0000 0000 0000"
                                    required>
                            </div>
                            <div class="col-12 col-md-4">
                                <label class="form-label" for="exp">Expiry</label>
                                <input class="form-control" id="exp" type="text" placeholder="MM/YY" required>
                            </div>
                            <div class="col-12 col-md-4">
                                <label class="form-label" for="cvv">CVV</label>
                                <input class="form-control" id="cvv" type="text" placeholder="123" required>
                            </div>
                            <div class="col-12 col-md-4">
                                <label class="form-label" for="promo">Promo code</label>
                                <input class="form-control" id="promo" type="text" placeholder="Optional">
                            </div>
                            <div class="col-12 d-grid d-sm-flex gap-2 mt-2">
                                <button class="btn btn-primary btn-lg" type="submit">Place Order</button>
                                <a class="btn btn-outline-secondary btn-lg" href="ecommerce.html">Continue Shopping</a>
                            </div>
                        </div>
                        <p class="text-muted small mt-3 mb-0">UI-only demo: order is not submitted.</p>
                    </form>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="section-panel">
                    <h4 class="fw-bold mb-3">Order Summary</h4>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted">Items</span>
                        <span class="fw-semibold">$78</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted">Shipping</span>
                        <span class="fw-semibold">$0</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted">Tax</span>
                        <span class="fw-semibold">$6</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold">Total</span>
                        <span class="fw-bold">$84</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
