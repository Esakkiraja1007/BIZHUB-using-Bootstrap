<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BIZHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-surface">
    <header class="section-panel position-sticky top-0" style="z-index: 1030;">
        <nav class="container navbar navbar-expand-lg navbar-light py-2">
            <a href="index.html#home" class="navbar-brand d-flex align-items-center gap-2">
                <img src="image/logo.png" alt="Logo" class="logo rounded-circle" width="40" height="40">
                <span>BIZ<span class="logo-title">HUB</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-lg-auto align-items-lg-center">
                    <li class="nav-item"><a href="index.html#home" class="nav-link px-lg-3">Home</a></li>
                    <li class="nav-item"><a href="about.html" class="nav-link px-lg-3">About</a></li>
                    <li class="nav-item"><a href="services.html" class="nav-link px-lg-3">Services</a></li>
                    <li class="nav-item"><a href="pricing.html" class="nav-link px-lg-3">Pricing</a></li>
                    <li class="nav-item"><a href="blog.html" class="nav-link px-lg-3">Blog</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link px-lg-3">Contact</a></li>
                </ul>
                <div class="d-flex flex-column flex-sm-row gap-2 ms-lg-3 mt-3 mt-lg-0">
                    <a class="btn btn-primary" href="login.html">Login</a>
                    <a class="btn btn-primary active" href="register.html">Sign Up</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-6">
                <div class="section-panel">
                    <h1 class="h3 fw-bold mb-3 text-center">Create Account</h1>
                    <form>
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="name" class="form-label">Name</label>
                                <input id="name" type="text" class="form-control" placeholder="Your name" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input id="email" type="email" class="form-control" placeholder="you@email.com" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="password" class="form-label">Password</label>
                                <input id="password" type="password" class="form-control" placeholder="Password" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="confirm" class="form-label">Confirm Password</label>
                                <input id="confirm" type="password" class="form-control" placeholder="Confirm password"
                                    required>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label" for="terms">I agree to the terms</label>
                                </div>
                            </div>
                            <div class="col-12 d-grid gap-2">
                                <a class="btn btn-primary btn-lg" href="dashboard.html">Register (UI Demo)</a>
                                <a class="btn btn-outline-secondary" href="login.html">Already have an account?</a>
                            </div>
                        </div>
                        <p class="text-muted small mt-3 mb-0">
                            This is a UI-only demo. The “Register” button just opens the dashboard page.
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
